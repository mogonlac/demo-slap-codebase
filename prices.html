<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donut Shop — Price List</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 14px; border: 1px solid #ddd; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Donut Shop — Price List</h1>
  <table id="prices">
    <thead><tr><th>Item</th><th>Price ($)</th></tr></thead>
    <tbody>
      <tr><td>Glazed Donut</td><td id="glazed">2.50</td></tr>
      <tr><td>Chocolate Donut</td><td id="chocolate">3.00</td></tr>
      <tr><td>Bagel (plain)</td><td id="bagel">0.50</td></tr>
      <tr><td>Bagel (everything)</td><td id="bagel-everything">2.25</td></tr>
      <tr><td>Croissant</td><td id="croissant">10.00</td></tr>
      <tr><td>Muffin</td><td id="muffin">2.75</td></tr>
    </tbody>
  </table>
</body>
</html>
